<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accessible Table</title>
  </head>
  <body>
    <main>
      <h1>Revenue Report</h1>

      <table>
        <caption>Quarterly revenue for 2026</caption>
        <thead>
          <tr>
            <th scope="col">Quarter</th>
            <th scope="col">Revenue</th>
            <th scope="col">Growth</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row">Q1</th>
            <td>$120,000</td>
            <td>12%</td>
          </tr>
          <tr>
            <th scope="row">Q2</th>
            <td>$145,000</td>
            <td>18%</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
