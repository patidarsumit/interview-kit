<!-- Angular template example: paste inside a component template file. -->

<form [formGroup]="profileForm" (ngSubmit)="save()">
  <p>
    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      autocomplete="email"
      [attr.aria-invalid]="profileForm.controls.email.invalid"
      aria-describedby="email-error"
    >

    @if (profileForm.controls.email.invalid) {
      <span id="email-error">Enter a valid email address.</span>
    }
  </p>

  <button type="submit" [disabled]="profileForm.invalid">
    Save
  </button>
</form>
