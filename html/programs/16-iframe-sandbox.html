<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iframe Sandbox</title>
  </head>
  <body>
    <main>
      <h1>Sandboxed Embed</h1>
      <iframe
        src="https://example.com"
        title="Example embedded page"
        sandbox="allow-scripts allow-same-origin"
        width="600"
        height="400"
      ></iframe>
    </main>
  </body>
</html>
