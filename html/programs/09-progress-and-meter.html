<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Progress And Meter</title>
  </head>
  <body>
    <main>
      <h1>Upload Status</h1>

      <label for="uploadProgress">Upload progress</label>
      <progress id="uploadProgress" max="100" value="65">65%</progress>

      <label for="storageUsage">Storage usage</label>
      <meter id="storageUsage" min="0" max="100" low="40" high="80" optimum="30" value="72">
        72%
      </meter>
    </main>
  </body>
</html>
