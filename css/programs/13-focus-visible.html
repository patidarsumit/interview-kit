<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Focus Visible</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }

      button {
        border: 0;
        background: #2563eb;
        color: white;
        padding: 0.75rem 1rem;
      }

      button:focus-visible {
        outline: 3px solid #f59e0b;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Focus Visible</h1>
      <button type="button">Keyboard focus me</button>
    </main>
  </body>
</html>
