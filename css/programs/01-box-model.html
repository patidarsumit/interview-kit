<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSS Box Model</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }

      .card {
        width: 300px;
        padding: 24px;
        border: 4px solid #2563eb;
        margin: 24px;
        background: #eff6ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Box Model</h1>
      <section class="card">
        <h2>Card</h2>
        <p>With border-box, width includes content, padding, and border.</p>
      </section>
    </main>
  </body>
</html>
