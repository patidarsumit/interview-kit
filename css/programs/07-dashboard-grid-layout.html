<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Grid Layout</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      .dashboard {
        min-height: 100dvh;
        display: grid;
        grid-template-areas:
          "header"
          "main";
      }

      header {
        grid-area: header;
        padding: 1rem;
        border-bottom: 1px solid #e5e7eb;
      }

      aside {
        display: none;
      }

      main {
        grid-area: main;
        padding: 1rem;
      }

      @media (min-width: 48rem) {
        .dashboard {
          grid-template-columns: 16rem 1fr;
          grid-template-areas:
            "sidebar header"
            "sidebar main";
        }

        aside {
          display: block;
          grid-area: sidebar;
          padding: 1rem;
          background: #111827;
          color: white;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <header>Header</header>
      <aside>Sidebar</aside>
      <main>
        <h1>Dashboard</h1>
        <p>Grid is useful for page-level layout.</p>
      </main>
    </div>
  </body>
</html>
