<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keyframe Animation</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(0.75rem);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        max-width: 24rem;
        padding: 1rem;
        border: 1px solid #d1d5db;
        animation: fade-in 250ms ease both;
      }

      @media (prefers-reduced-motion: reduce) {
        .card {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Animation</h1>
        <p>This animation respects reduced motion preferences.</p>
      </section>
    </main>
  </body>
</html>
