<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cascade Layers</title>
    <style>
      @layer reset, base, components, utilities;

      @layer reset {
        * {
          box-sizing: border-box;
        }
      }

      @layer base {
        body {
          font-family: system-ui, sans-serif;
          margin: 2rem;
        }
      }

      @layer components {
        .button {
          background: #2563eb;
          border: 0;
          color: white;
          padding: 0.75rem 1rem;
        }
      }

      @layer utilities {
        .bg-danger {
          background: #dc2626;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cascade Layers</h1>
      <button class="button bg-danger" type="button">Utility layer wins</button>
    </main>
  </body>
</html>
