@if (users().length > 0) {
  <section aria-labelledby="users-heading">
    <h2 id="users-heading">Users</h2>

    @for (user of users(); track user.id) {
      <article>
        <h3>{{ user.name }}</h3>
        <p>{{ user.email }}</p>
      </article>
    }
  </section>
} @else {
  <p>No users found.</p>
}
